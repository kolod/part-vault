# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: CMake on multiple platforms

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
      fail-fast: false

      # Set up a matrix to run the following 3 configurations:
      # 1. <Windows, Release, latest MSVC compiler toolchain on the default runner image, default generator>
      # 2. <Linux, Release, latest GCC compiler toolchain on the default runner image, default generator>
      # 3. <Linux, Release, latest Clang compiler toolchain on the default runner image, default generator>
      #
      # To add more build types (Release, Debug, RelWithDebInfo, etc.) customize the build_type list.
      matrix:
        variant:
          - windows-latest-msvc-release
          - ubuntu-latest-gcc-release
          - ubuntu-latest-clang-release
        include:
          - variant: windows-latest-msvc-release
            os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
            qt_arch: "win64_msvc2022_64"
            build_type: Release
          - variant: ubuntu-latest-gcc-release
            os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
            qt_arch: "linux_gcc_64"
            build_type: Release
          - variant: ubuntu-latest-clang-release
            os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
            qt_arch: "linux_gcc_64"
            build_type: Release

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install Qt
      # Install Qt using the jurplel/install-qt-action. 
      # We are installing the official version of Qt 6.10.0 for desktop development on both Windows and Linux.
      uses: jurplel/install-qt-action@v4
      with:
        version: "6.10.0"
        target: "desktop"
        arch: ${{ matrix.qt_arch }}        
        use-official: true
        email: ${{ secrets.QT_EMAIL }}
        pw: ${{ secrets.QT_PW }}

    - name: Set reusable strings
      # Turn repeated input strings (such as the build output directory) into step outputs. These step outputs can be used throughout the workflow file.
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Configure CMake
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -S ${{ github.workspace }}

    - name: Build
      # Build your program with the given configuration. Note that --config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      # Execute tests defined by the CMake configuration. Note that --build-config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
      run: ctest --build-config ${{ matrix.build_type }}

    - name: Upload test log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: ctest-last-log-${{ matrix.variant }}
        path: ${{ steps.strings.outputs.build-output-dir }}/Testing/Temporary/LastTest.log
        if-no-files-found: warn

  docs:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: "6.10.0"
        target: "desktop"
        arch: "linux_gcc_64"
        use-official: true
        email: ${{ secrets.QT_EMAIL }}
        pw: ${{ secrets.QT_PW }}

    - name: Install Doxygen
      run: sudo apt-get install -y doxygen

    - name: Configure CMake
      run: >
        cmake -B ${{ github.workspace }}/build
        -DCMAKE_CXX_COMPILER=g++
        -DCMAKE_C_COMPILER=gcc
        -DCMAKE_BUILD_TYPE=Release
        -DENABLE_INTERNAL_DOCS=ON
        -S ${{ github.workspace }}

    - name: Build documentation
      run: cmake --build ${{ github.workspace }}/build --target internal-docs

    - name: Upload documentation
      uses: actions/upload-artifact@v4
      with:
        name: internal-docs
        path: ${{ github.workspace }}/build/docs/html

  windows-installer-amd64:
    runs-on: windows-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up MSVC environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: amd64

    - name: Install Qt + IFW
      uses: jurplel/install-qt-action@v4
      with:
        version: "6.10.0"
        target: "desktop"
        arch: "win64_msvc2022_64"
        use-official: true
        email: ${{ secrets.QT_EMAIL }}
        pw: ${{ secrets.QT_PW }}
        tools: "tools_ifw"

    - name: Configure CMake
      run: >
        cmake -B ${{ github.workspace }}/build-installer-amd64
        -A x64
        -DCMAKE_BUILD_TYPE=Release
        -DENABLE_TESTS=OFF
        -DENABLE_DUMMY_DATA=OFF
        -DENABLE_IFW_INSTALLER=ON
        -S ${{ github.workspace }}

    - name: Build IFW installer
      run: cmake --build ${{ github.workspace }}/build-installer-amd64 --config Release --target ifw_installer

    - name: Upload installer artifact
      uses: actions/upload-artifact@v4
      with:
        name: partvault-windows-installer-amd64
        path: ${{ github.workspace }}/build-installer-amd64/PartVault-Installer-*.exe
        if-no-files-found: error

  deb-package:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install packaging tools
      run: sudo apt-get install -y dpkg-dev

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: "6.10.0"
        target: "desktop"
        arch: "linux_gcc_64"
        use-official: true
        email: ${{ secrets.QT_EMAIL }}
        pw: ${{ secrets.QT_PW }}

    - name: Configure CMake
      run: >
        cmake -B ${{ github.workspace }}/build-deb
        -DCMAKE_CXX_COMPILER=g++
        -DCMAKE_C_COMPILER=gcc
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_INSTALL_PREFIX=/usr
        -DENABLE_TESTS=OFF
        -DENABLE_DUMMY_DATA=OFF
        -DENABLE_IFW_INSTALLER=OFF
        -S ${{ github.workspace }}

    - name: Build
      run: cmake --build ${{ github.workspace }}/build-deb --config Release

    - name: Package
      working-directory: ${{ github.workspace }}/build-deb
      run: cpack -G DEB

    - name: Upload .deb artifact
      uses: actions/upload-artifact@v4
      with:
        name: partvault-deb-package
        path: ${{ github.workspace }}/build-deb/*.deb
        if-no-files-found: error

  # ── MSIX packaging ──────────────────────────────────────────────────────────
  # Produces a signed MSIX bundle for Windows amd64 and arm64.
  #
  # Required repository secrets:
  #   MSIX_CERTIFICATE_BASE64   — PFX certificate encoded as base64
  #   MSIX_CERTIFICATE_PASSWORD — Password for the PFX certificate
  #
  # Required repository assets:
  #   packaging/windows/msix/Package.appxmanifest  — MSIX app manifest
  #   packaging/windows/msix/Assets/               — Required logo images
  # ────────────────────────────────────────────────────────────────────────────
  msix:
    runs-on: windows-latest
    needs: build

    strategy:
      fail-fast: false
      matrix:
        include:
          # Native x64 build — Qt 6.10.0 only ships win64_msvc2022_64 for Windows
          - arch: amd64
            cmake_arch: x64
            qt_arch: win64_msvc2022_64
            msvc_arch: amd64

    steps:
    # ── 1. Checkout ────────────────────────────────────────────────────────────
    - name: Checkout code
      uses: actions/checkout@v6

    # ── 2. MSIX packaging environment ─────────────────────────────────────────
    # Sets up the MSVC toolchain for the target architecture.
    # MakeAppx.exe and signtool.exe are part of the Windows SDK,
    # which is pre-installed on windows-latest runners.
    - name: Set up MSVC environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: ${{ matrix.msvc_arch }}

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: "6.10.0"
        target: "desktop"
        arch: ${{ matrix.qt_arch }}
        use-official: true
        email: ${{ secrets.QT_EMAIL }}
        pw: ${{ secrets.QT_PW }}

    # ── 3. Build app binaries ──────────────────────────────────────────────────
    - name: Configure CMake
      run: >
        cmake -B ${{ github.workspace }}/build-msix-${{ matrix.arch }}
        -A ${{ matrix.cmake_arch }}
        -DCMAKE_BUILD_TYPE=Release
        -DENABLE_TESTS=OFF
        -S ${{ github.workspace }}

    - name: Build
      run: >
        cmake --build ${{ github.workspace }}/build-msix-${{ matrix.arch }}
        --config Release

    - name: Stage install tree
      # Install binaries into a clean staging directory used as the MSIX content root
      run: >
        cmake --install ${{ github.workspace }}/build-msix-${{ matrix.arch }}
        --config Release
        --prefix ${{ github.workspace }}/staging-${{ matrix.arch }}

    - name: Deploy Qt runtime
      # Copy Qt DLLs and plugins needed at runtime next to the executable
      shell: pwsh
      run: |
        $exePath = Get-ChildItem -Path "${{ github.workspace }}\staging-${{ matrix.arch }}" `
          -Recurse -Filter "*.exe" | Select-Object -First 1 -ExpandProperty FullName
        windeployqt --release $exePath

    # ── 4. Package into MSIX ───────────────────────────────────────────────────
    - name: Copy MSIX manifest and assets
      # MakeAppx.exe requires the manifest to be named AppxManifest.xml exactly.
      # The repo keeps the Visual Studio name (Package.appxmanifest), so copy it
      # explicitly with the required name, then copy the Assets folder separately.
      shell: pwsh
      run: |
        Copy-Item -Path "${{ github.workspace }}\packaging\windows\msix\Package.appxmanifest" `
          -Destination "${{ github.workspace }}\staging-${{ matrix.arch }}\AppxManifest.xml" `
          -Force
        Copy-Item -Path "${{ github.workspace }}\packaging\windows\msix\Assets" `
          -Destination "${{ github.workspace }}\staging-${{ matrix.arch }}\Assets" `
          -Recurse -Force

    - name: Package MSIX with MakeAppx
      shell: pwsh
      run: |
        # Locate MakeAppx.exe from the newest Windows SDK version available on the runner
        $sdkBin = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Directory |
          Where-Object { $_.Name -match "^\d+\.\d+\.\d+\.\d+$" } |
          Sort-Object Name -Descending |
          Select-Object -First 1 -ExpandProperty FullName
        $makeappx = "$sdkBin\x64\MakeAppx.exe"

        & $makeappx pack `
          /d "${{ github.workspace }}\staging-${{ matrix.arch }}" `
          /p "${{ github.workspace }}\PartVault-${{ matrix.arch }}.msix" `
          /nv   # /nv = no validation, accepts developer builds without Store validation

    # ── 5. Sign MSIX ───────────────────────────────────────────────────────────
    - name: Diagnose certificate secret
      shell: pwsh
      run: |
        $raw = "${{ secrets.MSIX_CERTIFICATE_BASE64 }}"
        Write-Host "Raw length      : $($raw.Length)"
        Write-Host "Raw sample      : ($raw.ToCharArray() -join ' ')"

        $stripped = $raw -replace '\s', ''
        Write-Host "Stripped length : $($stripped.Length)"

        # Report every unique character that is NOT a valid base64 or padding character
        $invalid = $stripped.ToCharArray() |
          Where-Object { $_ -notmatch '[A-Za-z0-9+/=]' } |
          Select-Object -Unique
        if ($invalid) {
            Write-Host "Invalid characters (hex codepoints):"
            $invalid | ForEach-Object { Write-Host "  U+$([int]$_ | ForEach-Object { '{0:X4}' -f $_ })" }
        } else {
            Write-Host "No invalid characters found — padding or length may be wrong"
            Write-Host "Length mod 4    : $($stripped.Length % 4)"
        }

    - name: Import signing certificate
      # Decode the base64 PFX secret, import it into the certificate store,
      # then expose only the thumbprint as an env variable — the PFX file is
      # deleted immediately to avoid leaving credentials on disk.
      shell: pwsh
      run: |
        # Strip whitespace/newlines that base64 encoders (certutil, openssl) insert.
        # Also translate base64url characters (- → +, _ → /) to standard base64.
        $b64 = "${{ secrets.MSIX_CERTIFICATE_BASE64 }}" -replace '\s', '' -replace '-', '+' -replace '_', '/'
        $certBytes = [Convert]::FromBase64String($b64)
        $certPath  = Join-Path $env:RUNNER_TEMP "signing.pfx"
        [IO.File]::WriteAllBytes($certPath, $certBytes)

        $securePass = ConvertTo-SecureString `
          "${{ secrets.MSIX_CERTIFICATE_PASSWORD }}" -AsPlainText -Force

        $cert = Import-PfxCertificate `
          -FilePath $certPath `
          -CertStoreLocation Cert:\CurrentUser\My `
          -Password $securePass

        # Persist only the thumbprint; never persist the password or raw cert bytes
        "CERT_THUMBPRINT=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append

        Remove-Item $certPath -Force

    - name: Sign MSIX with signtool
      shell: pwsh
      run: |
        $sdkBin = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Directory |
          Where-Object { $_.Name -match "^\d+\.\d+\.\d+\.\d+$" } |
          Sort-Object Name -Descending |
          Select-Object -First 1 -ExpandProperty FullName
        $signtool = "$sdkBin\x64\signtool.exe"

        & $signtool sign `
          /sha1 "$env:CERT_THUMBPRINT" `
          /fd   SHA256 `
          /td   SHA256 `
          /tr   http://timestamp.digicert.com `
          "${{ github.workspace }}\PartVault-${{ matrix.arch }}.msix"

    # ── 6. Upload artifact ─────────────────────────────────────────────────────
    - name: Upload MSIX artifact
      uses: actions/upload-artifact@v4
      with:
        name: partvault-msix-${{ matrix.arch }}
        path: ${{ github.workspace }}/PartVault-${{ matrix.arch }}.msix
        if-no-files-found: error
